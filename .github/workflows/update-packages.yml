name: Update packages

on:
  schedule:
    # Check manual package pins once each weekday morning UTC.
    - cron: "17 7 * * 1-5"
  workflow_dispatch:
    inputs:
      package:
        description: "Package to update (empty for all)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - pi-web-minimal
          - pi-mcp-adapter
          - pi-subagents
          - todoist-cli
    steps:
      - name: Skip unrequested package
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.package != '' && github.event.inputs.package != matrix.package
        run: |
          echo "Skipping ${{ matrix.package }}; requested ${{ github.event.inputs.package }}"

      - name: Checkout repository
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.package == '' || github.event.inputs.package == matrix.package
        uses: actions/checkout@v4

      - name: Install Nix
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.package == '' || github.event.inputs.package == matrix.package
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-substituters = https://cache.numtide.com https://nix-community.cachix.org https://nixos-raspberrypi.cachix.org
            extra-trusted-public-keys = niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= nixos-raspberrypi.cachix.org-1:4iMO9LXa8BqhU+Rpg6LQKiGa2lsNh/j2oiYLNOQ5sPI=

      - name: Update package
        id: update
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.package == '' || github.event.inputs.package == matrix.package
        run: |
          nix shell nixpkgs#python3 nixpkgs#nodejs nixpkgs#git -c \
            .github/ci/update-package.py "${{ matrix.package }}"

      - name: Verify package build
        if: steps.update.outputs.updated == 'true'
        run: nix build --no-link ".#${{ matrix.package }}"

      - name: Create pull request
        if: steps.update.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ${{ steps.update.outputs.branch }}
          delete-branch: true
          title: ${{ steps.update.outputs.title }}
          body: |
            ${{ steps.update.outputs.body }}

            Generated by `.github/workflows/update-packages.yml`.
          commit-message: ${{ steps.update.outputs.title }}
          signoff: true
